name = "shade"
main = "index.js"
compatibility_date = "2026-05-03"

# 密码采用纯 SHA-256 哈希（临时分享，不加盐）

[vars]
MAX_UPLOAD_SIZE_MB = "200"

# R2 存储桶绑定
[[r2_buckets]]
binding = "BUCKET_R2"
bucket_name = "shade-bucket"

# KV 命名空间
[[kv_namespaces]]
binding = "SHARES_KV"
id = "2e1e12a6c3be4c368e06574cee81c8ee"